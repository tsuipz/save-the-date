<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/save-the-date/favicon.svg" />
    <!-- PNG fallback for browsers that don't render SVG favicons (older Safari). -->
    <link rel="icon" type="image/png" sizes="96x96" href="/save-the-date/favicon-96.png" />
    <!-- Home-screen icon for iOS (square art; iOS applies its own rounded mask). -->
    <link rel="apple-touch-icon" href="/save-the-date/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0e0620" />
    <meta
      name="description"
      content="Shelley Shen & Patrick Tsui are getting married — May 29, 2027. Please save the date."
    />

    <!-- Open Graph / link previews. Absolute URLs are required by most
         scrapers (iMessage, Facebook, Twitter). These point at the GitHub
         Pages host (tsuipz/save-the-date) — update the host here, the favicon
         link, and vite.config.ts `base` together if the repo/domain changes. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tsuipz.github.io/save-the-date/" />
    <meta property="og:title" content="Save the Date — Shelley &amp; Patrick" />
    <meta
      property="og:description"
      content="Shelley Shen & Patrick Tsui are getting married — May 29, 2027."
    />
    <meta
      property="og:image"
      content="https://tsuipz.github.io/save-the-date/og.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Shelley Shen & Patrick Tsui — May 29, 2027"
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Save the Date — Shelley &amp; Patrick" />
    <meta
      name="twitter:description"
      content="Shelley Shen & Patrick Tsui are getting married — May 29, 2027."
    />
    <meta
      name="twitter:image"
      content="https://tsuipz.github.io/save-the-date/og.png"
    />

    <!-- Wisteria fonts: Cormorant Garamond, Cinzel, EB Garamond -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@300;400&family=EB+Garamond:ital@0;1&display=swap"
      rel="stylesheet"
    />

    <title>Save the Date — Shelley &amp; Patrick</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
